<script>
// ═══ PWA MANIFEST ═══
(function(){
  var manifest={
    name:'On Air Chelles — Training Log',
    short_name:'On Air',
    description:'Suivi d\'entraînement — On Air Chelles',
    start_url:'.',
    display:'standalone',
    background_color:'#080809',
    theme_color:'#080809',
    orientation:'portrait',
    icons:[
      {src:generateIcon(192),sizes:'192x192',type:'image/png',purpose:'any maskable'},
      {src:generateIcon(512),sizes:'512x512',type:'image/png',purpose:'any maskable'}
    ]
  };
  function generateIcon(size){
    var c=document.createElement('canvas');c.width=size;c.height=size;
    var ctx=c.getContext('2d');
    var r=size*0.18;
    ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(size-r,0);
    ctx.quadraticCurveTo(size,0,size,r);ctx.lineTo(size,size-r);
    ctx.quadraticCurveTo(size,size,size-r,size);ctx.lineTo(r,size);
    ctx.quadraticCurveTo(0,size,0,size-r);ctx.lineTo(0,r);
    ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();
    ctx.fillStyle='#080809';ctx.fill();
    // Logo OA
    ctx.fillStyle='#4ade80';
    ctx.font='bold '+(size*0.32)+'px system-ui';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('OA',size/2,size*0.42);
    ctx.fillStyle='#3f3f46';
    ctx.font=(size*0.13)+'px system-ui';
    ctx.fillText('TRAINING',size/2,size*0.68);
    return c.toDataURL('image/png');
  }
  // Set manifest via blob
  var blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
  document.getElementById('pwa-manifest').href=URL.createObjectURL(blob);

  // ═══ SERVICE WORKER ═══
  if('serviceWorker' in navigator){
    var swCode=`
const CACHE='onair-v1';
const ASSETS=[self.location.href.split('?')[0]];
self.addEventListener('install',function(e){
  e.waitUntil(caches.open(CACHE).then(function(c){return c.addAll(ASSETS);}));
  self.skipWaiting();
});
self.addEventListener('activate',function(e){
  e.waitUntil(caches.keys().then(function(keys){
    return Promise.all(keys.filter(function(k){return k!==CACHE;}).map(function(k){return caches.delete(k);}));
  }));
  self.clients.claim();
});
self.addEventListener('fetch',function(e){
  e.respondWith(caches.match(e.request).then(function(r){
    return r||fetch(e.request).then(function(resp){
      if(resp&&resp.status===200){
        var clone=resp.clone();
        caches.open(CACHE).then(function(c){c.put(e.request,clone);});
      }
      return resp;
    }).catch(function(){return caches.match(e.request);});
  }));
});
`;
    var swBlob=new Blob([swCode],{type:'application/javascript'});
    var swUrl=URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl,{scope:'./'}).then(function(reg){
      console.log('SW registered',reg.scope);
    }).catch(function(e){console.log('SW error',e);});
  }
})();
</script>

function getRecordPoids(exId){
  // Retourne le poids max historique pour cet exercice (hors session en cours)
  var max=0;
  DB.forEach(function(s){
    var ex=s.exercises&&s.exercises.find(function(e){return e.id===exId;});
    if(!ex||!ex.data||!ex.data.sets)return;
    ex.data.sets.forEach(function(st){
      if(st.done&&st.type!=='R'&&st.poids){var p=parseFloat(st.poids)||0;if(p>max)max=p;}
    });
  });
  return max;
}

function fmtDate(s){return new Date(s).toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});}
function fmtDur(ms){var m=Math.round(ms/60000);return m>=60?Math.floor(m/60)+'h'+String(m%60).padStart(2,'0'):m+' min';}
function todayStr(){return new Date().toISOString().slice(0,10);}
function nowISO(){return new Date().toISOString();}
function e(tag,cls,html,attrs){var d=document.createElement(tag);if(cls)d.className=cls;if(html!==undefined)d.innerHTML=html;if(attrs)for(var k in attrs)d.setAttribute(k,attrs[k]);return d;}
function makeSet(type){return{poids:'',reps:'',done:false,type:type||'W'};}
function initSets(ex){
  if(ex.isForce)return[makeSet('R'),makeSet('R'),makeSet('R'),makeSet('W'),makeSet('W'),makeSet('W')];
  return Array.from({length:ex.series},function(){return makeSet('W');});
}

function badgePill(badge){
  if(!badge||!BADGE_COLORS[badge])return '';
  var b=BADGE_COLORS[badge];

}

// ═══ TIMER ═══
function playRestAlert(){
  // Vibration
  if(navigator.vibrate)navigator.vibrate([200,100,200]);
  // Son bip
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,150].forEach(function(delay){
      var o=ctx.createOscillator();var g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=880;o.type='sine';
      g.gain.setValueAtTime(0,ctx.currentTime+delay/1000);
      g.gain.linearRampToValueAtTime(0.3,ctx.currentTime+delay/1000+0.01);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+delay/1000+0.18);
      o.start(ctx.currentTime+delay/1000);
      o.stop(ctx.currentTime+delay/1000+0.2);
    });
  }catch(e){}
}

function toggleSSTimer(ssId, totalSec){
  if(activeTimers[ssId]){
    clearInterval(activeTimers[ssId].interval);
    delete activeTimers[ssId];
    var el=document.getElementById('ss-timer-'+ssId);
    if(el){el.style.borderColor='#2a2a2e';el.style.background='#111113';el.innerHTML='<span style="font-size:11px;font-family:monospace;font-weight:700;color:#52525b">'+String(Math.floor(totalSec/60)).padStart(2,'0')+':'+String(totalSec%60).padStart(2,'0')+'</span><span style="font-size:8px;color:#3f3f46">REPOS</span>';}
    return;
  }
  var rem=totalSec;
  var interval=setInterval(function(){
    rem--;
    var el=document.getElementById('ss-timer-'+ssId);
    if(el){
      var m=Math.floor(rem/60),s=rem%60;
      el.innerHTML='<span style="font-size:11px;font-family:monospace;font-weight:700;color:#fbbf24">'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'</span><span style="font-size:8px;color:#fbbf24">REPOS</span>';
    }
    if(activeTimers[ssId])activeTimers[ssId].rem=rem;
    if(rem<=0){clearInterval(interval);delete activeTimers[ssId];playRestAlert();}
  },1000);
  activeTimers[ssId]={interval:interval,rem:rem};
  var el=document.getElementById('ss-timer-'+ssId);
  if(el){el.style.borderColor='#fbbf24';el.style.background='rgba(251,191,36,0.08)';}
}

function startTimer(exId, seconds){
  if(activeTimers[exId]){clearInterval(activeTimers[exId].interval);delete activeTimers[exId];}
  var rem = seconds;
  var wrap = document.getElementById('timer-'+exId);
  if(!wrap)return;
  function updateTimer(){
    var circle = document.getElementById('tcircle-'+exId);
    var txt = document.getElementById('ttxt-'+exId);
    var lbl = document.getElementById('tlbl-'+exId);
    if(!circle||!txt)return;
    var pct = seconds>0?rem/seconds:0;
    var R=18,C=2*Math.PI*R;
    circle.setAttribute('stroke-dasharray',(C*pct)+' '+C);
    var mm=Math.floor(rem/60),ss=rem%60;
    txt.textContent = rem===0?'OK':mm+':'+String(ss).padStart(2,'0');
    var col = rem===0?'#22c55e':'#4ade80';
    circle.setAttribute('stroke',col);
    txt.style.color=col;
    if(lbl)lbl.textContent=rem===0?'GO !':'EN COURS';
    if(wrap)wrap.style.borderColor=rem===0?'rgba(34,197,94,0.25)':'rgba(74,222,128,0.25)';
  }
  updateTimer();
  var interval = setInterval(function(){
    rem--;
    updateTimer();
    if(rem<=0){clearInterval(interval);delete activeTimers[exId];playRestAlert();}
  },1000);
  activeTimers[exId]={interval:interval,rem:rem,seconds:seconds};
}

function adjustTimer(exId, delta){
  if(activeTimers[exId]){clearInterval(activeTimers[exId].interval);delete activeTimers[exId];}
  var d=sessData[exId];
  if(!d)return;
  d.timerSec=Math.max(15,(d.timerSec||60)+delta);
  var txt=document.getElementById('tsec-'+exId);
  if(txt)txt.textContent=d.timerSec+'s';
}

// ═══ SESSION TIMER ═══
function startSessTimer(){
  sessStart = Date.now() - sessElapsed;
  sessTimer = setInterval(function(){
    sessElapsed = Date.now()-sessStart;
    var mm=Math.floor(sessElapsed/60000),ss=Math.floor((sessElapsed%60000)/1000);
    var el=document.getElementById('sess-elapsed');
    if(el)el.textContent=String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0');
  },1000);
}

function getLastStr(exId){
  var found=getLastSetsData(exId);
  if(!found)return null;
  var parts=found.sets.filter(function(s){return s.done&&s.poids&&s.reps;}).map(function(s){return s.poids+'kg×'+s.reps;});
  return parts.length?parts.join(' · '):null;
}

function getLastSetsData(exId){
  // Cherche dans toutes les variantes confondues
  var lastSess=null;
  for(var i=0;i<DB.length;i++){
    var s=DB[i];
    var hasEx=s.exercises&&s.exercises.some(function(e){return e.id===exId;});
    if(hasEx){
      if(!lastSess||new Date(s.date)>new Date(lastSess.date))lastSess=s;
    }
  }
  if(!lastSess)return null;
  var ex=lastSess.exercises&&lastSess.exercises.find(function(e){return e.id===exId;});
  if(!ex||!ex.data||!ex.data.sets)return null;
  return {sets:ex.data.sets, date:lastSess.date, optLabel:lastSess.optLabel, tag:lastSess.tag};
}

// ═══ SESSION ACTIONS ═══
function updateSet(exId,idx,field,val){
  var d=sessData[exId];if(!d)return;
  var wasD=d.sets[idx].done;
  d.sets[idx][field]=val;
  if(!wasD&&d.sets[idx].done&&d.sets[idx].type!=='R'){
    var sec=d.timerSec||60;
    startTimer(exId,sec);
    checkAutoAdvance(exId);
  }
  updateSessProgress();
}

function toggleSet(exId,idx){
  var d=sessData[exId];if(!d)return;
  d.sets[idx].done=!d.sets[idx].done;
  var set=d.sets[idx];
  var btn=document.getElementById('setcheck-'+exId+'-'+idx);
  if(btn){
    var col=activeSession.opt.color;
    var isPR=set.done&&set.type!=='R'&&set.poids&&(parseFloat(set.poids)||0)>getRecordPoids(exId);
    btn.style.borderColor=set.done?(isPR?'#fbbf24':col):'#2a2a2e';
    btn.style.background=set.done?(isPR?'rgba(251,191,36,0.2)':col+'20'):'transparent';
    btn.innerHTML=set.done?'<span style="font-size:10px;font-weight:700;color:'+(isPR?'#fbbf24':col)+'">'+(isPR?'🏆':'✓')+'</span>':'';
  }
  if(set.done&&set.type!=='R'){
    if(!deloadMode)startTimer(exId,d.timerSec||60);
    checkAutoAdvance(exId);
    // Détection PR
    if(set.poids){
      var p=parseFloat(set.poids)||0;
      var record=getRecordPoids(exId);
      if(p>record){
        var ex=activeSession.opt.exercices.find(function(e){return e.id===exId;});
        sessPRs[exId]={nom:ex?ex.nom:exId,poids:p,reps:set.reps||'?'};
        updatePRBadge();
      }
    }
  }
  updateSessExHeader(exId);
  updateSessProgress();
}

function checkAutoAdvance(exId){
  var d=sessData[exId];if(!d)return;
  var ws=d.sets.filter(function(s){return s.type!=='R';});
  if(ws.every(function(s){return s.done;})){
    var order=activeSession.order;
    var idx=order.indexOf(exId);
    if(idx>=0&&idx<order.length-1){
      var nextId=order[idx+1];
      setTimeout(function(){
        if(!sessExOpen[nextId]){sessExOpen[nextId]=true;render();}
      },400);
    }
  }
}

function updateSessExHeader(exId){
  var el=document.getElementById('sess-ex-'+exId);
  if(!el)return;
  var d=sessData[exId];if(!d)return;
  var ws=d.sets.filter(function(s){return s.type!=='R';});
  var done=ws.filter(function(s){return s.done;}).length;
  var allDone=done===ws.length&&ws.length>0;
  el.style.borderColor=allDone?'rgba(34,197,94,0.25)':'#1e1e22';
  el.style.borderLeftColor=allDone?'#22c55e':'#3f3f46';
  var cnt=el.querySelector('[data-cnt]');
  if(!cnt){var headers=el.querySelectorAll('div');headers.forEach(function(h){if(h.textContent.match(/^\d+\/\d+$/))cnt=h;});}
}

function addSet(exId){
  var d=sessData[exId];if(!d)return;
  d.sets.push(makeSet('W'));
  renderSessView();
}

function removeSet(exId){
  var d=sessData[exId];if(!d)return;
  var ws=d.sets.map(function(s,i){return{s:s,i:i};}).filter(function(x){return x.s.type!=='R';});
  if(ws.length<=1)return;
  var last=ws[ws.length-1];
  d.sets.splice(last.i,1);
  renderSessView();
}

function updateMemo(exId,val){var d=sessData[exId];if(d)d.memo=val;}
function toggleSessEx(exId){sessExOpen[exId]=!sessExOpen[exId];renderSessView();}
function toggleDetail(exId){sessExDetail[exId]=!sessExDetail[exId];renderSessView();}

function moveEx(exId,dir){
  var order=activeSession.order;
  var idx=order.indexOf(exId);
  if(dir==='up'&&idx>0){var tmp=order[idx-1];order[idx-1]=order[idx];order[idx]=tmp;}
  if(dir==='down'&&idx<order.length-1){var tmp=order[idx];order[idx]=order[idx+1];order[idx+1]=tmp;}
  renderSessView();
}

function updatePRBadge(){
  var btn=document.getElementById('finish-btn');
  if(!btn)return;
  var allSets=Object.values(sessData).reduce(function(a,d){return a+d.sets.length;},0);
  var doneSets=Object.values(sessData).reduce(function(a,d){return a+d.sets.filter(function(s){return s.done;}).length;},0);
  var prCount=Object.keys(sessPRs).length;
  var prLabel=prCount>0?' · '+prCount+' 🏆':'';
  btn.textContent='Terminer · '+doneSets+'/'+allSets+' séries'+prLabel;
}

function updateSessProgress(){
  var allSets=0,doneSets=0;
  Object.values(sessData).forEach(function(d){allSets+=d.sets.length;doneSets+=d.sets.filter(function(s){return s.done;}).length;});
  var pct=allSets>0?doneSets/allSets:0;
  var fill=document.getElementById('sess-prog-fill');
  if(fill)fill.style.width=(pct*100)+'%';
  var cnt=document.getElementById('sess-sets-cnt');
  if(cnt)cnt.textContent=doneSets+'/'+allSets+' séries';
}

function getSwapCandidates(exId){
  return VARIANTES[exId]||[];
}

function showSwapPopup(exId){
  var candidates=getSwapCandidates(exId);
  var currentEx=null;
  activeSession.opt.exercices.forEach(function(e){if(e.id===exId)currentEx=e;});
  if(!currentEx)return;

  var overlay=document.createElement('div');
  overlay.className='hist-overlay';
  overlay.id='swap-overlay-ref';
  overlay.onclick=function(e){if(e.target===overlay)closeSwapPopup();};

  var candidateRows=candidates.length===0
    ? '<div style="text-align:center;padding:16px 0;font-size:12px;color:#52525b">Aucune variante disponible pour cet exercice</div>'
    : candidates.map(function(c,i){
        return '<div onclick="confirmSwap(\''+exId+'\','+i+')" style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:10px;border:1px solid #1e1e22;background:#0d0d0f;margin-bottom:6px;cursor:pointer">'
          +'<span style="font-size:16px;flex-shrink:0;margin-top:1px">'+c.rank+'</span>'
          +'<div style="flex:1;min-width:0">'
          +'<div style="font-size:13px;font-weight:600;color:#f4f4f5;line-height:1.3">'+c.nom+'</div>'
          +'<div style="font-size:10px;color:#3f3f46;margin-top:2px;font-style:italic">'+c.machine+'</div>'
          +'<div style="font-size:11px;color:#71717a;margin-top:4px;line-height:1.4">'+c.detail+'</div>'
          +'</div>'
          +'<span style="font-size:11px;color:#3f3f46;flex-shrink:0;margin-top:3px">→</span>'
          +'</div>';
      }).join('');

  overlay.innerHTML='<div class="hist-sheet">'
    +'<div class="hist-handle"></div>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'
    +'<div>'
    +'<div style="font-size:13px;font-weight:700;color:#f4f4f5">Variantes disponibles</div>'
    +'<div style="font-size:10px;color:#52525b;margin-top:2px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+currentEx.nom+'</div>'
    +'</div>'
    +'<button onclick="closeSwapPopup()" style="background:#1a1a1d;border:1px solid #2a2a2e;border-radius:8px;padding:5px 10px;color:#71717a;font-size:11px;cursor:pointer;font-family:inherit">✕</button>'
    +'</div>'
    +candidateRows
    +'</div>';

  document.body.appendChild(overlay);
}

function closeSwapPopup(){
  var o=document.getElementById('swap-overlay-ref');
  if(o)o.remove();
}

function confirmSwap(exId, varIdx){
  closeSwapPopup();
  var candidates=getSwapCandidates(exId);
  var chosen=candidates[varIdx];
  if(!chosen)return;

  // Trouver l'index du slot dans la session
  var slotIdx=activeSession.opt.exercices.findIndex(function(e){return e.id===exId;});
  if(slotIdx<0)return;

  // Créer un objet exercice minimal basé sur la variante, en conservant les paramètres clés de l'original
  var origEx=activeSession.opt.exercices[slotIdx];
  var newId='swap_'+exId+'_'+varIdx;
  var newEx={
    id:newId,
    nom:chosen.nom,
    machine:chosen.machine,
    series:origEx.series,
    repsTarget:origEx.repsTarget,
    reposSec:origEx.reposSec,
    tempo:origEx.tempo,
    isForce:origEx.isForce,
    notes:chosen.detail,
    badge:origEx.badge
  };

  // Remplacer dans la session
  activeSession.opt.exercices[slotIdx]=newEx;
  activeSession.order[activeSession.order.indexOf(exId)]=newId;

  // Init données si besoin
  if(!sessData[newId]){
    sessData[newId]={sets:initSets(newEx),memo:'',timerSec:newEx.reposSec||60};
  }

  // Préserver l'état ouvert
  if(sessExOpen[exId]){sessExOpen[newId]=true;delete sessExOpen[exId];}

  renderSessView();
}

function showAddExPopup(){
  var currentIds={};
  activeSession.order.forEach(function(id){currentIds[id]=true;});
  var seen={};
  var byTag={};
  SEANCES.forEach(function(s){
    s.options.forEach(function(opt){
      opt.exercices.forEach(function(ex){
        if(seen[ex.id]||currentIds[ex.id])return;

function confirmAddEx(ex){
  closeAddExPopup();

  activeSession.order.push(ex.id);
  sessData[ex.id]={sets:initSets(ex),memo:'',timerSec:ex.reposSec||60};
  sessExOpen[ex.id]=true;
  renderSessView();
}
function removeExFromSession(exId){
  if(activeSession.order.length<=1)return;
  activeSession.order=activeSession.order.filter(function(id){return id!==exId;});
  activeSession.opt.exercices=activeSession.opt.exercices.filter(function(e){return e.id!==exId;});
  delete sessData[exId];
  delete sessExOpen[exId];
  delete sessExDetail[exId];
  renderSessView();
}

function startFreeSession(){
  var freeSeance={id:'libre',jour:'',focus:'Séance libre',couleur:'#71717a',tag:'LIBRE'};
  var freeOpt={key:'free',label:'Libre',color:'#71717a',exercices:[]};
  activeSession={seance:freeSeance,opt:freeOpt,order:[]};
  sessData={};
  sessExOpen={};
  sessExDetail={};

  sessMemo='';

function startSession(seanceId,optKey){
  var seance=getSeance(seanceId);
  var opt=seance.options.find(function(o){return o.key===optKey;});
  activeSession={seance:seance,opt:opt,order:opt.exercices.map(function(ex){return ex.id;})};
  sessData={};
  sessExOpen={};
  sessExDetail={};
  opt.exercices.forEach(function(ex){
    var sets=initSets(ex);
    // Mode deload : supprimer le dernier set de travail
    if(deloadMode){
      var workSetsIdx=sets.map(function(s,i){return s.type!=='R'?i:-1;}).filter(function(i){return i>=0;});
      if(workSetsIdx.length>1)sets.splice(workSetsIdx[workSetsIdx.length-1],1);
    }
    // Pré-remplissage : récupérer la dernière session pour cet exercice
    var lastData=getLastSetsData(ex.id);
    if(lastData&&lastData.sets){
      var lastWork=lastData.sets.filter(function(s){return s.type!=='R'&&s.done&&s.poids&&s.reps;});
      var workIdx=0;
      sets.forEach(function(s){
        if(s.type!=='R'&&lastWork[workIdx]){
          var p=parseFloat(lastWork[workIdx].poids)||0;
          // Mode deload : 60% arrondi au 0.5 près
          if(deloadMode) p=Math.round(p*0.6*2)/2;
          s.poids=p>0?String(p):'';
          s.reps=lastWork[workIdx].reps;
          workIdx++;
        }
      });
    }
    sessData[ex.id]={sets:sets,memo:'',timerSec:ex.reposSec||60};
  });
  sessExOpen[opt.exercices[0].id]=true;
  sessElapsed=0;
  sessMemo='';
  sessPRs={};
  Object.values(activeTimers).forEach(function(t){clearInterval(t.interval);});
  activeTimers={};
  if(sessTimer)clearInterval(sessTimer);
  renderSessView();
  startSessTimer();
}

function finishSession(){
  if(sessTimer)clearInterval(sessTimer);
  Object.values(activeTimers).forEach(function(t){clearInterval(t.interval);});
  activeTimers={};
  var opt=activeSession.opt;
  var exs=activeSession.order.map(function(id){return opt.exercices.find(function(ex){return ex.id===id;});});
  var totalSets=0,doneSets=0;
  Object.values(sessData).forEach(function(d){totalSets+=d.sets.length;doneSets+=d.sets.filter(function(s){return s.done;}).length;});
  var sess={
    id:'s'+Date.now(),date:nowISO(),
    seanceId:activeSession.seance.id,optKey:opt.key,optLabel:opt.label,
    tag:activeSession.seance.tag,focus:activeSession.seance.focus,couleur:activeSession.seance.couleur,
    duration:sessElapsed,memo:sessMemo,
    exercises:exs.map(function(ex){return{id:ex.id,nom:ex.nom,series:ex.series,data:sessData[ex.id]};}),
    totalSets:doneSets,completed:doneSets===totalSets,
    prs:Object.values(sessPRs),
    deload:deloadMode
  };
  DB.unshift(sess);
  saveDB();
  activeSession=null;
  currentTab='dash';
  render();
}

function cancelSession(){
  if(sessTimer)clearInterval(sessTimer);
  Object.values(activeTimers).forEach(function(t){clearInterval(t.interval);});
  activeTimers={};
  activeSession=null;
  render();
}

// ═══ RENDER SESSION ═══
function renderSessView(){
  var app=document.getElementById('app');
  if(!app||!activeSession)return;
  var seance=activeSession.seance;
  var opt=activeSession.opt;
  var order=activeSession.order;
  var exs=order.map(function(id){return opt.exercices.find(function(ex){return ex.id===id;});});
  var allSets=Object.values(sessData).reduce(function(a,d){return a+d.sets.length;},0);
  var doneSets=Object.values(sessData).reduce(function(a,d){return a+d.sets.filter(function(s){return s.done;}).length;},0);
  var mm=Math.floor(sessElapsed/60000),ss=Math.floor((sessElapsed%60000)/1000);
  // Grouper les exercices en supersets (badge SS consécutifs)
  var groups=[];
  var i=0;
  while(i<exs.length){
    var ex=exs[i];
    if(ex&&ex.badge==='SS'&&exs[i+1]&&exs[i+1].badge==='SS'){
      groups.push({type:'superset',exs:[ex,exs[i+1]]});
      i+=2;
    }else{
      groups.push({type:'single',ex:ex});
      i++;
    }
  }
  var exsHtml=groups.map(function(g,gi){
    if(g.type==='single')return renderSessEx(g.ex,gi,groups.length);
    // Superset : wrapper visuel + timer partagé
    var ssTimerSec=Math.max(g.exs[0].reposSec||60,g.exs[1].reposSec||60);
    // Trouver le timer partagé actif (on utilise l'id du 2e exo comme clé timer)
    var ssTimerId='ss_'+g.exs[0].id+'_'+g.exs[1].id;
    var ssTimer=activeTimers[ssTimerId];
    var ssRem=ssTimer?ssTimer.rem:ssTimerSec;
    var ssMins=Math.floor(ssRem/60),ssSecs=ssRem%60;
    var ssActive=!!ssTimer;
    var ssDone=g.exs.every(function(e){var d=sessData[e.id];return d&&d.sets.filter(function(s){return s.type!=='W'||s.done;}).length===d.sets.length;});
    return '<div style="border:1px solid rgba(251,191,36,0.3);border-radius:12px;background:rgba(251,191,36,0.03);overflow:hidden;display:flex;flex-direction:column;gap:0">'
      +'<div style="display:flex;align-items:center;gap:6px;padding:6px 12px;border-bottom:1px solid rgba(251,191,36,0.1)">'
      +'<span style="font-size:10px;color:#fbbf24;font-weight:700;letter-spacing:0.05em">⚡ SUPERSET</span>'
      +'<span style="font-size:9px;color:#52525b">— Enchaîner sans repos</span>'
      +'<div style="margin-left:auto;display:flex;align-items:center;gap:6px">'
      +'<div class="timer-inner" style="cursor:pointer;border-color:'+(ssActive?'#fbbf24':'#2a2a2e')+';background:'+(ssActive?'rgba(251,191,36,0.08)':'#111113')+'" onclick="toggleSSTimer(\''+ssTimerId+'\','+ssTimerSec+')" id="ss-timer-'+ssTimerId+'">'
      +'<span style="font-size:11px;font-family:monospace;font-weight:700;color:'+(ssActive?'#fbbf24':'#52525b')+'">'+String(ssMins).padStart(2,'0')+':'+String(ssSecs).padStart(2,'0')+'</span>'
      +'<span style="font-size:8px;color:'+(ssActive?'#fbbf24':'#3f3f46')+'">REPOS</span>'
      +'</div>'
      +'</div>'
      +'</div>'
      +g.exs.map(function(ex,ei){return renderSessEx(ex,gi*2+ei,exs.length);}).join('')
      +'</div>';
  }).join('');
  app.innerHTML='<div class="sess-header">'
    +'<div style="max-width:600px;margin:0 auto">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">'
    +'<div style="display:flex;align-items:center;gap:8px">'
    +'<button class="btn-outline" onclick="cancelSession()">✕</button>'
    +'<span style="font-size:13px;font-weight:700;color:'+seance.couleur+'">'+seance.tag+'</span>'
    +'<span style="font-size:11px;color:#52525b">· Option '+opt.label+'</span>'
    +'</div>'
    +'<div style="font-family:monospace;font-size:13px;font-weight:700;color:#71717a" id="sess-elapsed">'+String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0')+'</div>'
    +'</div>'
    +'<div class="progress-bar"><div class="progress-fill" id="sess-prog-fill" style="width:'+(allSets>0?doneSets/allSets*100:0)+'%;background:'+seance.couleur+'"></div></div>'
    +'<div style="display:flex;justify-content:space-between;margin-top:4px">'
    +'<span style="font-size:9px;color:#3f3f46" id="sess-sets-cnt">'+doneSets+'/'+allSets+' séries</span>'
    +'<span style="font-size:9px;color:#3f3f46">'+Math.round(allSets>0?doneSets/allSets*100:0)+'%</span>'
    +'</div></div></div>'
    +'<div style="max-width:600px;margin:0 auto;padding:10px 14px;display:flex;flex-direction:column;gap:6px">'
    +exsHtml

    +'</div>';

function getWeeksSinceLastDeload(){
  if(DB.length===0)return 0;
  var sorted=DB.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  var lastDeloadDate=null;
  for(var i=0;i<sorted.length;i++){
    if(sorted[i].deload){lastDeloadDate=new Date(sorted[i].date);break;}
  }
  var refDate=lastDeloadDate||new Date(sorted[sorted.length-1].date);
  return Math.floor((new Date()-refDate)/(7*86400000));
}

function getStreak(){
  // Nombre de semaines consécutives avec 3+ séances (en partant de la semaine la plus récente)
  if(DB.length===0)return 0;
  // Grouper les sessions par semaine ISO (lundi = début)
  var weeks={};
  DB.forEach(function(s){
    var d=new Date(s.date);
    var day=d.getDay();var diff=(day+6)%7;
    var mon=new Date(d);mon.setDate(d.getDate()-diff);mon.setHours(0,0,0,0);
    var key=mon.toISOString().slice(0,10);
    if(!weeks[key])weeks[key]=0;
    weeks[key]++;
  });
  var sorted=Object.keys(weeks).sort().reverse();
  var streak=0;
  var now=new Date();var day=now.getDay();var diff=(day+6)%7;
  var curMon=new Date(now);curMon.setDate(now.getDate()-diff);curMon.setHours(0,0,0,0);
  for(var i=0;i<sorted.length;i++){
    var wk=new Date(sorted[i]);
    var expectedMon=new Date(curMon);expectedMon.setDate(curMon.getDate()-7*i);
    if(Math.abs(wk-expectedMon)>86400000*2)break;// tolérance 2j
    if(weeks[sorted[i]]>=3)streak++;
    else break;
  }
  return streak;
}

function exportJSON(){

  var blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);

  a.href=url;
  a.download='onair_'+todayStr()+'.json';

var importState={status:'idle',count:0,error:''};

function triggerImport(){
  var input=document.createElement('input');
  input.type='file';
  input.accept='.json,application/json';
  input.onchange=function(e){
    var file=e.target.files[0];
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        var sessions=data.sessions||data;
        if(!Array.isArray(sessions))throw new Error('Format invalide');
        importState={status:'confirm',count:sessions.length,pending:sessions,error:''};
      }catch(err){
        importState={status:'error',count:0,error:'Fichier invalide ou corrompu'};
      }
      render();
    };
    reader.readAsText(file);
  };
  input.click();
}

function confirmImport(){
  if(!importState.pending)return;
  DB=importState.pending;
  saveDB();
  importState={status:'success',count:DB.length,error:''};
  render();
}

function cancelImport(){
  importState={status:'idle',count:0,error:''};
  render();
}

function getAllExercises(){

    if(!seen[ex.id]){seen[ex.id]=true;list.push({id:ex.id,nom:ex.nom,tag:s.tag,couleur:s.couleur});}

function getStatsForEx(exId){
  // Retourne [{date, poidsMax, volumeTotal, rm1}] trié chronologiquement
  var points=[];
  DB.forEach(function(s){
    var ex=s.exercises&&s.exercises.find(function(e){return e.id===exId;});
    if(!ex||!ex.data||!ex.data.sets)return;
    var ws=ex.data.sets.filter(function(st){return st.done&&st.type!=='R'&&st.poids&&st.reps;});
    if(!ws.length)return;
    var pMax=Math.max.apply(null,ws.map(function(st){return parseFloat(st.poids)||0;}));
    var vol=ws.reduce(function(a,st){return a+(parseFloat(st.poids)||0)*(parseFloat(st.reps)||0);},0);
    var rm1=Math.max.apply(null,ws.map(function(st){
      var p=parseFloat(st.poids)||0,r=parseFloat(st.reps)||0;
      return p*(1+r/30);
    }));
    points.push({date:s.date,poidsMax:pMax,vol:Math.round(vol),rm1:Math.round(rm1*10)/10});
  });
  points.sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  return points;
}

function drawLineChart(points,key,color,W,H){
  if(points.length===0)return '<text x="'+(W/2)+'" y="'+(H/2)+'" text-anchor="middle" fill="#3f3f46" font-size="11" font-family="system-ui">Pas encore de données</text>';
  var pad={t:12,r:12,b:28,l:44};
  var cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
  var vals=points.map(function(p){return p[key];});
  var minV=Math.min.apply(null,vals), maxV=Math.max.apply(null,vals);
  if(minV===maxV){minV=Math.max(0,minV-5);maxV=maxV+5;}
  var range=maxV-minV||1;

  function px(i){return pad.l+i/(points.length-1||1)*cw;}
  function py(v){return pad.t+ch-(v-minV)/range*ch;}

  // Grid lines (3)
  var gridHtml='';
  for(var g=0;g<=3;g++){
    var gv=minV+range*g/3;
    var gy=pad.t+ch-ch*g/3;
    var label=key==='vol'?(Math.round(gv/100)*100)+'':gv.toFixed(gv%1?1:0);
    gridHtml+='<line x1="'+pad.l+'" y1="'+gy+'" x2="'+(pad.l+cw)+'" y2="'+gy+'" stroke="#1a1a1d" stroke-width="1"/>';
    gridHtml+='<text x="'+(pad.l-5)+'" y="'+(gy+4)+'" text-anchor="end" fill="#3f3f46" font-size="9" font-family="monospace">'+label+'</text>';
  }

  // Area fill
  var pts=points.map(function(p,i){return px(i)+','+py(p[key]);}).join(' ');
  var areaD='M'+px(0)+','+py(points[0][key])+' '+points.map(function(p,i){return 'L'+px(i)+','+py(p[key]);}).join(' ')+' L'+px(points.length-1)+','+(pad.t+ch)+' L'+pad.l+','+(pad.t+ch)+' Z';
  var lineD='M'+points.map(function(p,i){return px(i)+','+py(p[key]);}).join(' L');

  // X axis dates (max 5 labels)
  var xLabels='';
  var step=Math.max(1,Math.floor(points.length/5));
  for(var i=0;i<points.length;i+=step){
    var d=new Date(points[i].date);
    var lbl=(d.getDate())+'/'+(d.getMonth()+1);
    xLabels+='<text x="'+px(i)+'" y="'+(H-6)+'" text-anchor="middle" fill="#3f3f46" font-size="9" font-family="monospace">'+lbl+'</text>';
  }

  // Dots + tooltips (last point highlighted)
  var dots='';
  points.forEach(function(p,i){
    var isLast=(i===points.length-1);
    var cx=px(i),cy=py(p[key]);
    dots+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(isLast?4:2.5)+'" fill="'+(isLast?color:'#111113')+'" stroke="'+color+'" stroke-width="'+(isLast?0:1.5)+'"/>';
    if(isLast){
      var lbl=key==='vol'?p[key]+' kg·r':p[key]+' kg';
      var tx=Math.min(cx+6, W-50);
      dots+='<rect x="'+(tx-2)+'" y="'+(cy-16)+'" width="'+(lbl.length*6+6)+'" height="14" rx="3" fill="#111113" stroke="'+color+'" stroke-width="0.8" opacity="0.9"/>';
      dots+='<text x="'+tx+'" y="'+(cy-6)+'" fill="'+color+'" font-size="9" font-family="monospace" font-weight="700">'+lbl+'</text>';
    }
  });

  var gradId='grad_'+key;
  return '<defs><linearGradient id="'+gradId+'" x1="0" y1="0" x2="0" y2="1">'
    +'<stop offset="0%" stop-color="'+color+'" stop-opacity="0.18"/>'
    +'<stop offset="100%" stop-color="'+color+'" stop-opacity="0.02"/>'
    +'</linearGradient></defs>'
    +gridHtml
    +'<path d="'+areaD+'" fill="url(#'+gradId+')" />'
    +'<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'
    +xLabels+dots;
}

function drawBarChart(points,W,H,color){
  if(points.length===0)return '<text x="'+(W/2)+'" y="'+(H/2)+'" text-anchor="middle" fill="#3f3f46" font-size="11" font-family="system-ui">Pas encore de données</text>';
  var pad={t:12,r:12,b:28,l:44};
  var cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
  var vals=points.map(function(p){return p.vol;});
  var maxV=Math.max.apply(null,vals)||1;

  var n=points.length;
  var barW=Math.max(4,Math.floor(cw/n*0.6));
  var gap=(cw-barW*n)/(n+1);

  // Grid
  var gridHtml='';
  for(var g=0;g<=3;g++){
    var gv=Math.round(maxV*g/3/100)*100;
    var gy=pad.t+ch-ch*g/3;
    gridHtml+='<line x1="'+pad.l+'" y1="'+gy+'" x2="'+(pad.l+cw)+'" y2="'+gy+'" stroke="#1a1a1d" stroke-width="1"/>';
    gridHtml+='<text x="'+(pad.l-5)+'" y="'+(gy+4)+'" text-anchor="end" fill="#3f3f46" font-size="9" font-family="monospace">'+gv+'</text>';
  }

  var bars='';
  var xLabels='';
  var step=Math.max(1,Math.floor(n/5));
  points.forEach(function(p,i){
    var bh=Math.max(2,(p.vol/maxV)*ch);
    var bx=pad.l+gap+(barW+gap)*i;
    var by=pad.t+ch-bh;
    var isLast=(i===n-1);
    bars+='<rect x="'+bx+'" y="'+by+'" width="'+barW+'" height="'+bh+'" rx="2" fill="'+color+'" opacity="'+(isLast?1:0.45)+'"/>';
    if(isLast){
      bars+='<rect x="'+(bx-2)+'" y="'+(by-16)+'" width="'+(String(p.vol).length*6+10)+'" height="14" rx="3" fill="#111113" stroke="'+color+'" stroke-width="0.8" opacity="0.9"/>';
      bars+='<text x="'+(bx+barW/2)+'" y="'+(by-6)+'" text-anchor="middle" fill="'+color+'" font-size="9" font-family="monospace" font-weight="700">'+p.vol+'</text>';
    }
    if(i%step===0){
      var d=new Date(p.date);
      xLabels+='<text x="'+(bx+barW/2)+'" y="'+(H-6)+'" text-anchor="middle" fill="#3f3f46" font-size="9" font-family="monospace">'+(d.getDate())+'/'+(d.getMonth()+1)+'</text>';
    }
  });

  return gridHtml+bars+xLabels;
}

function renderStats(){
  var allEx=getAllExercises();
  if(!statsExId&&allEx.length>0)statsExId=allEx[0].id;

  var selEx=allEx.find(function(e){return e.id===statsExId;})||allEx[0];
  var points=statsExId?getStatsForEx(statsExId):[];

  // Dropdown options
  var opts=allEx.map(function(e){
    return '<option value="'+e.id+'"'+(e.id===statsExId?' selected':'')+'>'+e.nom+'</option>';
  }).join('');

  var noData=points.length===0;
  var W=540, H=140;

  // Summary stats

  if(points.length>0){
    var poids=points.map(function(p){return p.poidsMax;});

    var bestRM=Math.max.apply(null,points.map(function(p){return p.rm1;}));

    summary='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">'
      +'<div class="stat-card"><div style="font-size:18px;font-weight:700;font-family:monospace;color:#c084fc;line-height:1">'+best+'<span style="font-size:10px;color:#71717a"> kg</span></div><div style="font-size:9px;color:#52525b;margin-top:3px">Record poids</div></div>'
      +'<div class="stat-card"><div style="font-size:18px;font-weight:700;font-family:monospace;color:#fbbf24;line-height:1">'+bestRM+'<span style="font-size:10px;color:#71717a"> kg</span></div><div style="font-size:9px;color:#52525b;margin-top:3px">1RM estimé</div></div>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">'
      +'<div class="stat-card"><div style="font-size:18px;font-weight:700;font-family:monospace;color:#a78bfa;line-height:1">'+points.length+'</div><div style="font-size:9px;color:#52525b;margin-top:3px">Séances</div></div>'
      +'<div class="stat-card"><div style="font-size:18px;font-weight:700;font-family:monospace;color:'+(trend>=0?'#4ade80':'#f87171')+';line-height:1">'+(trend>=0?'+':'')+trend+'<span style="font-size:10px;color:#71717a"> kg</span></div><div style="font-size:9px;color:#52525b;margin-top:3px">Progression</div></div>'
      +'</div>';
  }

  var chartHtml='';
  if(noData){
    chartHtml='<div class="card card-pad" style="text-align:center;padding:32px 0;margin-bottom:8px">'
      +'<div style="font-size:22px;margin-bottom:6px">📊</div>'
      +'<div style="font-size:12px;color:#52525b">Aucune donnée pour cet exercice.<br>Lance une séance pour commencer !</div>'
      +'</div>';
  } else {
    chartHtml=''
      // Courbe poids max
      +'<div class="card" style="margin-bottom:8px">'
      +'<div style="padding:10px 12px 4px;display:flex;justify-content:space-between;align-items:center">'
      +'<span style="font-size:10px;font-weight:700;color:#c084fc;text-transform:uppercase;letter-spacing:0.06em">Poids max · kg</span>'
      +'<span style="font-size:9px;color:#3f3f46;font-family:monospace">par séance</span>'
      +'</div>'
      +'<div style="padding:0 8px 10px;overflow:hidden">'
      +'<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block">'
      +drawLineChart(points,'poidsMax','#c084fc',W,H)
      +'</svg></div></div>'
      // Courbe 1RM estimé
      +'<div class="card" style="margin-bottom:8px">'
      +'<div style="padding:10px 12px 4px;display:flex;justify-content:space-between;align-items:center">'
      +'<span style="font-size:10px;font-weight:700;color:#fbbf24;text-transform:uppercase;letter-spacing:0.06em">1RM estimé · kg</span>'
      +'<span style="font-size:9px;color:#3f3f46;font-family:monospace">Epley</span>'
      +'</div>'
      +'<div style="padding:0 8px 10px;overflow:hidden">'
      +'<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block">'
      +drawLineChart(points,'rm1','#fbbf24',W,H)
      +'</svg></div></div>'
      // Barres volume
      +'<div class="card" style="margin-bottom:8px">'
      +'<div style="padding:10px 12px 4px;display:flex;justify-content:space-between;align-items:center">'
      +'<span style="font-size:10px;font-weight:700;color:#a78bfa;text-transform:uppercase;letter-spacing:0.06em">Volume · kg·reps</span>'
      +'<span style="font-size:9px;color:#3f3f46;font-family:monospace">par séance</span>'
      +'</div>'
      +'<div style="padding:0 8px 10px;overflow:hidden">'
      +'<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block">'
      +drawBarChart(points,W,H,'#a78bfa')
      +'</svg></div></div>';
  }

  return '<div class="content">'
    +'<div class="section-label" style="margin-bottom:6px">Exercice</div>'
    +'<div style="position:relative;margin-bottom:12px">'
    +'<select onchange="setStatsEx(this.value)" style="width:100%;background:#0d0d0f;border:1px solid #1e1e22;border-radius:10px;padding:10px 34px 10px 12px;font-size:13px;color:#f4f4f5;outline:none;appearance:none;-webkit-appearance:none;cursor:pointer;font-family:inherit">'
    +opts
    +'</select>'
    +'<span style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:10px;color:#52525b;pointer-events:none">▼</span>'
    +'</div>'
    +summary
    +chartHtml
    +'</div>';
}

function render(){
  var app=document.getElementById('app');
  var cnt=document.getElementById('sess-count');
  if(cnt)cnt.textContent=DB.length+' séance'+(DB.length!==1?'s':'');

  if(activeSession){renderSessView();document.querySelector('.nav').style.display='none';return;}
  document.querySelector('.nav').style.display='block';

  if(viewingSession){renderSessDetail(viewingSession);return;}

  var html='';
  if(currentTab==='dash')html=renderDash();
  else if(currentTab==='prog')html=renderProg();
  else if(currentTab==='search')html=renderSearch();
  else if(currentTab==='guide')html=renderGuide();
  else if(currentTab==='cal')html=renderCal();
  else if(currentTab==='hist')html=renderHist();
  else if(currentTab==='stats')html=renderStats();
  else if(currentTab==='params')html=renderParams();
  else if(currentTab==='vacances')html=renderVacances();
  app.innerHTML=html;

  // Update nav
  document.querySelectorAll('.nav-btn').forEach(function(btn){
    var t=btn.getAttribute('data-tab');
    btn.classList.toggle('active',t===currentTab);
    var dot=document.getElementById('dot-'+t);
    if(dot)dot.classList.toggle('hidden',t!==currentTab);
  });
}

var deferredInstallPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();
  deferredInstallPrompt=e;
  var banner=document.getElementById('pwa-install-banner');
  if(banner)banner.style.display='flex';
});
window.addEventListener('appinstalled',function(){
  deferredInstallPrompt=null;
  var banner=document.getElementById('pwa-install-banner');
  if(banner)banner.style.display='none';
});
function triggerInstall(){
  if(!deferredInstallPrompt)return;
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.then(function(r){
    deferredInstallPrompt=null;
    var banner=document.getElementById('pwa-install-banner');
    if(banner)banner.style.display='none';
  });
}
